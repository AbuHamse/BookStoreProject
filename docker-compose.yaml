services:
  # --- DATABASE ---
  mongodb:
    image: mongo:latest
    container_name: bookstore_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # --- BACKEND ---
  server:
    build: ./server
    container_name: bookstore_server
    ports:
      - "3222:3222"
    environment:
      - PORT=3222
      - MONGO_URI=mongodb://mongodb:27017/bookstore
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb

  # --- FRONTEND ---
  client:
    build: ./client
    container_name: bookstore_client
    ports:
      - "3000:80" # Maps your browser's port 3000 to Nginx's port 80
    depends_on:
      - server

volumes:
  mongo_data: